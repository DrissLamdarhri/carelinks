name: EAS Android dev build (with FCM)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Enable corepack & pnpm
        run: |
          corepack enable
          corepack prepare pnpm@8.6.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write google-services.json (from secret, base64)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then echo "GOOGLE_SERVICES_JSON secret not set"; exit 1; fi
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > mobile-app/google-services.json

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android (development profile)
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          npx eas build --platform android --profile development --non-interactive
